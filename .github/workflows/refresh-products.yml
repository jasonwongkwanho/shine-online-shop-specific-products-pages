name: Refresh Product Pages

on:
  schedule:
    # 16:00 UTC = 00:00 Hong Kong time.
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-product-pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check Google Drive credentials
        env:
          GOOGLE_DRIVE_API_KEY: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_ACCESS_TOKEN: ${{ secrets.GOOGLE_DRIVE_ACCESS_TOKEN }}
        run: |
          if [ -z "${GOOGLE_DRIVE_API_KEY}${GOOGLE_SERVICE_ACCOUNT_JSON}${GOOGLE_DRIVE_ACCESS_TOKEN}" ]; then
            echo "::error::Set GOOGLE_DRIVE_API_KEY or GOOGLE_SERVICE_ACCOUNT_JSON in repository secrets."
            exit 1
          fi

      - name: Sync manifest from Google Drive
        env:
          GOOGLE_DRIVE_API_KEY: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_ACCESS_TOKEN: ${{ secrets.GOOGLE_DRIVE_ACCESS_TOKEN }}
        run: python tools/sync_drive_manifest.py

      - name: Rebuild site
        run: python tools/refresh_site.py

      - name: Verify generated site
        run: python tools/verify_site.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/images products docs tools README.md AGENTS.md requirements.txt
          if git diff --cached --quiet; then
            echo "No product page changes to commit."
          else
            git commit -m "Refresh product pages from Drive"
            git push
          fi
